name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        # strategy.py + tests only need pandas + numpy. Skipping the full
        # requirements.txt (streamlit / plotly / alphalens) keeps CI fast.
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest

      - name: Run tests
        run: python -m pytest tests/ -q
